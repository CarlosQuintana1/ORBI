<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0a0a23"/>
    </radialGradient>
    <radialGradient id="body" cx="35%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#eacfff"/>
      <stop offset="50%" stop-color="#c77dff"/>
      <stop offset="100%" stop-color="#4a0e8f"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80"  cy="80"  r="2.5" fill="white" opacity="0.6"/>
  <circle cx="420" cy="60"  r="2"   fill="white" opacity="0.5"/>
  <circle cx="460" cy="200" r="3"   fill="white" opacity="0.4"/>
  <circle cx="50"  cy="380" r="2"   fill="white" opacity="0.5"/>
  <circle cx="440" cy="420" r="2.5" fill="white" opacity="0.6"/>
  <circle cx="100" cy="450" r="2"   fill="white" opacity="0.4"/>
  <circle cx="370" cy="470" r="2"   fill="white" opacity="0.5"/>
  <!-- Planet ring (back) -->
  <ellipse cx="256" cy="272" rx="210" ry="52" stroke="rgba(255,215,80,0.35)" stroke-width="14" fill="none" stroke-dasharray="380 280"/>
  <!-- Body -->
  <circle cx="256" cy="268" r="168" fill="url(#body)"/>
  <!-- Planet ring (front) -->
  <ellipse cx="256" cy="272" rx="210" ry="52" stroke="rgba(255,215,80,0.65)" stroke-width="14" fill="none" stroke-dasharray="280 380" stroke-dashoffset="380"/>
  <!-- Eyes whites -->
  <ellipse cx="210" cy="250" rx="44" ry="48" fill="white"/>
  <ellipse cx="302" cy="250" rx="44" ry="48" fill="white"/>
  <!-- Pupils -->
  <circle cx="218" cy="258" r="26" fill="#1a0533"/>
  <circle cx="310" cy="258" r="26" fill="#1a0533"/>
  <!-- Eye shine -->
  <circle cx="226" cy="248" r="11" fill="white"/>
  <circle cx="318" cy="248" r="11" fill="white"/>
  <!-- Smile -->
  <path d="M186 318 Q256 378 326 318" stroke="white" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Antennae -->
  <line x1="208" y1="108" x2="180" y2="42"  stroke="rgba(255,255,255,0.55)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="172" cy="26" r="18" fill="#ffd60a"/>
  <line x1="304" y1="108" x2="332" y2="42"  stroke="rgba(255,255,255,0.55)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="340" cy="26" r="18" fill="#ffd60a"/>
  <!-- Sparkle stars -->
  <path d="M430,110 L434,96 L438,110 L452,114 L438,118 L434,132 L430,118 L416,114 Z" fill="#ffd60a" opacity="0.9"/>
  <path d="M72,160  L75,150 L78,160 L88,163 L78,166 L75,176 L72,166 L62,163 Z"      fill="#ffd60a" opacity="0.8"/>
  <path d="M68,310  L71,302 L74,310 L82,313 L74,316 L71,324 L68,316 L60,313 Z"       fill="white"   opacity="0.5"/>
</svg>
